{% extends 'layout.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-warning">
            <div class="card-header bg-warning">
                <h4 class="mb-0 text-center text-dark">Modificar Cita</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nombre de la Mascota</label>
                        <input type="text" name="mascota" class="form-control" value="{{ cita['mascota'] }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Propietario</label>
                        <input type="text" name="propietario" class="form-control" value="{{ cita['propietario'] }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Especie</label>
                        <input type="text" name="especie" class="form-control" value="{{ cita['especie'] }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nueva Fecha</label>
                        <input type="text" name="fecha" class="form-control" value="{{ cita['fecha'] }}" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning">Actualizar Datos</button>
                        <a href="{{ url_for('index') }}" class="btn btn-link text-muted">Cancelar Cambios</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
